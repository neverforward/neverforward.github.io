    <style>
        .body {
            border-radius: 25px;
            height: 770px;
            position: relative;
            /* 添加此属性以便正确定位伪元素 */
        }

        .button {
            padding: 15px 20px;
            font-size: 24px;
            text-align: center;
            cursor: pointer;
            outline: none;
            color: #fff;
            background-color: #4CAF50;
            border: none;
            border-radius: 15px;
            box-shadow: 0 9px #999;
        }

        .button:hover {
            background-color: #3e8e41
        }

        .button:active {
            background-color: #3e8e41;
            box-shadow: 0 5px #666;
            transform: translateY(4px);
        }

        .vertical-menu {
            margin-left: 10px;
            margin-top: 2%;
            display: flex;
            flex-direction: column;
            /* 如果需要垂直堆叠 */
            gap: 10px;
            border-radius: 5px;
            position: fixed;
            top: 0;
            left: 0;
        }

        .vertical-menu a {
            color: black;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        .vertical-menu a:hover {
            background-color: rgb(54, 63, 120);
            border-radius: 5px;
        }

        .main {
            padding-top: 2%;
            margin-top: 2%;
            margin-left: 5%;
            background-color: rgba(38, 44, 81, 0.966);
            height: 700px;
        }

        .icon {
            border-radius: 100%;
            border-style: solid;
            border-color: #202020;
            border-width: 5px;
        }

        .icon:hover {
            box-shadow: 4px 4px 10px rgba(27, 31, 58, 0.966);
        }

        .cards {
            margin-top: 10px;
            display: flex;
            flex-direction: row;
            padding-right: 10px;
            margin-left: 40px;
        }

        .card {
            background-color: rgba(55, 63, 116, 0.966);
            border-radius: 5px;
            width: 300px;
            margin-left: 20px;
            padding-left: 10px;
            height: 200px;
            color: white;
            box-shadow: 0px 0px 10px rgba(18, 20, 35, 0.966);
            transition: boc-shadow 1s;
        }

        .card:hover {
            box-shadow: 4px 4px 10px rgba(18, 20, 35, 0.966);
            transition: box-shadow 1s;
        }

        .card button {
            color: white;
            text-decoration: none;
            background-color: rgb(0, 106, 255);
            background-image: linear-gradient(to right, #0091ff, #005eff);
            border: none;
            border-radius: 5px;
            margin-left: 200px;
            padding-left: 10px;
            padding-right: 10px;
            padding-top: 5px;
            padding-bottom: 5px;
            margin-top: 10px;
            box-shadow: 0px 0px 10px rgb(0, 85, 255);
            font-size: 12px;
            transition: padding-left 500ms, padding-right 500ms, box-shadow 500ms, font-size 500ms;
        }

        .card button:hover {
            box-shadow: 5px 5px 10px rgb(0, 85, 255);
            padding-left: 16px;
            padding-right: 16px;
            font-size: 15px;
            transition: all 500ms;
        }
